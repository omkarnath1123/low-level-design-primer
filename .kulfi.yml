# .kulfi.yml — project-level Code Puppy config
# This repo's puppy is named Kulfi 🍦🐶
#
# Code Puppy will remember:
#   1. Puppy name for this repo  → Kulfi
#   2. All scripts/tools         → tools/ (Java 21 .java files only, no Python scripts)
#   3. Temp/task scripts         → Java 21 single-file programs in tools/

puppy:
  name: Kulfi
  repo: low-level-design-primer

# All tools and scripts live here — Java 21 single-file programs only
tools_dir: tools/

# Build instructions (run from repo root)
build:
  all:    bash tools/build_all.sh
  gradle: bash tools/build_gradle.sh
  maven:  bash tools/build_maven.sh
  javac:  bash tools/compile_javac.sh

# Clone + sync solutions
clone:  java tools/CloneSolutions.java
sync:   java tools/SyncSolutions.java
